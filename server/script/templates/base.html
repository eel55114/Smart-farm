<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %} - 스마트 팜</title>
    {{ bootstrap.load_css() }}

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.9"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <style>
        #sidebar .nav-link {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        #sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        #sidebar .nav-link.active {
            background-color: #0d6efd !important;
            color: #fff !important;
        }
        .submenu-link {
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out;
            border-radius: 0.25rem;
        }
        .submenu-link:hover {
            color: #fff !important;
            background-color: rgba(255, 255, 255, 0.05);
        }
        .submenu-link.active-sub {
            color: #fff !important;
            font-weight: bold;
            background-color: rgba(13, 110, 253, 0.2);
        }
        .transition-transform {
            transition: transform 0.2s ease;
        }
        .rotate-180 {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <!-- 사이드바 영역 -->
        <nav id="sidebar" class="bg-dark vh-100 p-3 sticky-top flex-shrink-0" style="width: 250px;">
            <ul class="nav nav-pills flex-column mt-4">
                <li class="nav-item mb-1">
                    <a href="/"
                        class="nav-link d-flex align-items-center text-white {{ 'active fw-bold' if request.endpoint == 'index' }}">
                        <span class="material-symbols-outlined me-2">home</span>
                        홈
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="/plants"
                        class="nav-link d-flex align-items-center text-white {{ 'active fw-bold' if request.endpoint == 'plants' }}">
                        <span class="material-symbols-outlined me-2">eco</span>
                        작물 현황
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="/robot/schedule" 
                        class="nav-link d-flex align-items-center justify-content-between text-white {{ 'active fw-bold' if request.path.startswith('/robot') }}">
                        <span class="d-flex align-items-center">
                            <span class="material-symbols-outlined me-2">smart_toy</span>
                            로봇 관리
                        </span>
                        <span class="material-symbols-outlined fs-6 transition-transform {{ 'rotate-180' if request.path.startswith('/robot') }}">expand_more</span>
                    </a>
                    <div class="collapse {{ 'show' if request.path.startswith('/robot') }}" id="robotSubmenu">
                        <ul class="nav flex-column ms-3 mt-1 small">
                            <li class="nav-item mb-1">
                                <a href="/robot/schedule" 
                                    class="submenu-link text-white-50 {{ 'active-sub' if request.path == '/robot/schedule' }}">
                                    일정 계획
                                </a>
                            </li>
                            <li class="nav-item mb-1">
                                <a href="/robot/manual_control" 
                                    class="submenu-link text-white-50 {{ 'active-sub' if request.path == '/robot/manual_control' }}">
                                    수동 제어
                                </a>
                            </li>
                            <li class="nav-item mb-1">
                                <a href="/robot/settings" 
                                    class="submenu-link text-white-50 {{ 'active-sub' if request.path == '/robot/settings' }}">
                                    설정값 변경
                                </a>
                            </li>
                        </ul>
                    </div>
                </li>
                <li class="nav-item mb-1">
                    <a href="/environment"
                        class="nav-link d-flex align-items-center text-white {{ 'active fw-bold' if request.endpoint == 'environment' }}">
                        <span class="material-symbols-outlined me-2">sensors</span>
                        재배 환경
                    </a>
                </li>
            </ul>
        </nav>

        <main class="container mt-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS 로드 -->
    {{ bootstrap.load_js() }}
</body>

</html>
